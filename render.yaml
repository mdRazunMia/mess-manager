services:
  - type: web
    name: mess-management-backend
    env: node
    rootDir: backend
    buildCommand: npm install && npm run build && npx prisma migrate deploy && npx prisma db seed
    startCommand: npm run start:prod
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        value: file:./dev.db
      - key: PORT
        value: 3001
    plan: free
